<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <nav>
            <div class="logo">MyPortfolio</div>
            <ul class="nav-links">
                <li><a href="#home">Home</a></li>
                <li><a href="#projects">Work</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
            <button id="theme-toggle">🌙 Dark Mode</button>
        </nav>
    </header>

    <main>
        <section id="home">
            <h1>Hello, I'm Moudud Ahmed Alve </h1>
            <h2>I am <span id="typing-text"></span><span class="cursor">|</span></h2>
            <p>Welcome to my personal portfolio. I am passionate about creating interactive and responsive web experiences.</p>
        </section>

        <section id="projects">
            <h2>My Projects</h2>
            <div id="projects-container" class="project-grid">
                </div>
        </section>

        <section id="contact">
            <h2>Contact Me</h2>
            <form id="contact-form">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" placeholder="Enter your name">
                    <span class="error-msg" id="name-error"></span>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="text" id="email" placeholder="Enter your email">
                    <span class="error-msg" id="email-error"></span>
                </div>

                <div class="form-group">
                    <label for="subject">Subject</label>
                    <input type="text" id="subject" placeholder="Enter the subject">
                    <span class="error-msg" id="subject-error"></span>
                </div>

                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" rows="5" placeholder="Write your message..."></textarea>
                    <span class="error-msg" id="message-error"></span>
                </div>

                <button type="submit">Send Message</button>
                <p id="success-msg" class="success-msg"></p>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Moudud Ahmed Alve. Built for Web Technologies Lab.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
